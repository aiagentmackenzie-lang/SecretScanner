# SecretScanner Default Configuration
# Compatible with .gitleaks.toml format

title = "SecretScanner Default Rules"

[extend]
useDefault = true

# Global allowlist
[[allowlist]]
description = "Global exclusions"
paths = [
    '''vendor/''',
    '''node_modules/''',
    '''\.gitleaks\.toml$''',
    '''\.gitleaks\.toml$''',
    '''(.*?)(\.jpg|\.jpeg|\.png|\.gif|\.pdf|\.doc|\.docx|\.bin|\.exe)$''',
    '''\.git/''',
]
regexes = [
    '''AKIAIOSFODNN7EXAMPLE''',
    '''ASIAIOSFODNN7EXAMPLE''',
    '''AROAIOSFODNN7EXAMPLE''',
    '''A3TAIOSFDODNN7EXAMPLE''',
    '''.*EXAMPLE.*''',
    '''.*example.*''',
    '''.*test.*''',
]
stopwords = [
    "example",
    "test",
    "fake",
    "dummy",
    "sample",
    "placeholder",
]

# AWS Rules
[[rules]]
id = "aws-access-key"
description = "AWS Access Key ID"
regex = '''\b((?:A3T[A-Z0-9]|AKIA|ASIA|ABIA|ACCA)[A-Z2-7]{16})\b'''
entropy = 3.0
keywords = ["A3T", "AKIA", "ASIA", "ABIA", "ACCA"]
severity = "critical"
tags = ["aws", "cloud", "access-key"]

[[rules.allowlist]]
description = "AWS example keys"
regexes = ['''.+EXAMPLE$''']

[[rules]]
id = "aws-secret-key"
description = "AWS Secret Access Key"
regex = '''\b([A-Za-z0-9/+=]{40})\b'''
entropy = 4.5
keywords = []
severity = "critical"
tags = ["aws", "cloud", "secret-key"]

[[rules]]
id = "aws-mws-key"
description = "AWS MWS Key"
regex = '''\bmzn\.mws\.[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\b'''
keywords = ["mzn.mws"]
severity = "high"
tags = ["aws", "marketplace", "mws"]

