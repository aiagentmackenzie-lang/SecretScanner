severity = "high"
tags = ["gcp", "google", "api-key"]

# Azure Rules
[[rules]]
id = "azure-storage-key"
description = "Azure Storage Account Key"
regex = '''DefaultEndpointsProtocol=https;AccountName=[^;]+;AccountKey=[A-Za-z0-9+/=]{86}=='''
keywords = ["DefaultEndpointsProtocol", "AccountKey"]
severity = "high"
tags = ["azure", "storage", "key"]

# JWT
[[rules]]
id = "jwt-token"
description = "JSON Web Token"
regex = '''eyJ[A-Za-z0-9_-]*\.eyJ[A-Za-z0-9_-]*\.[A-Za-z0-9_-]*'''
entropy = 4.0
keywords = ["eyJ"]
severity = "medium"
tags = ["jwt", "token"]

# Generic API Key / Secret Patterns
[[rules]]
id = "generic-api-key"
description = "Generic API Key"
regex = '''(?i)(?:api[_-]?key|apikey|key)[\s]*[=:]+[\s]*["\']?[a-zA-Z0-9]{32,}["\']?'''
entropy = 4.0
keywords = ["api_key", "api-key", "apikey", "key"]
severity = "medium"
tags = ["api", "key", "generic"]

[[rules]]
id = "generic-secret"
description = "Generic Secret"
regex = '''(?i)(?:secret|password|passwd|pwd)[\s]*[=:]+[\s]*["\']?[a-zA-Z0-9/+=_!@#$%^&*]{8,}["\']?'''
entropy = 3.5
keywords = ["secret", "password", "passwd", "pwd"]
severity = "medium"
tags = ["secret", "password", "generic"]

[[rules]]
id = "database-connection"
description = "Database Connection String"
regex = '''(?i)(mongodb(\+srv)?|postgres(ql)?|mysql|redis|amqp)://[^:]+:[^@]+@'''
keywords = ["mongodb://", "postgres://", "mysql://", "redis://"]
severity = "high"
tags = ["database", "connection", "string"]

