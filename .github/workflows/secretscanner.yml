name: SecretScanner

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  scan:
    name: Scan for Secrets
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full git history for better scanning
    
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
    
    - name: Build SecretScanner
      run: |
        go build -o secretscanner ./cmd/secretscanner
    
    - name: Restore baseline cache
      uses: actions/cache@v4
      with:
        path: .secretscanner-baseline.json
        key: secretscanner-baseline-${{ github.sha }}
        restore-keys: |
          secretscanner-baseline-
    
    - name: Scan repository
      id: scan
      run: |
        # Check if baseline exists
        if [ -f .secretscanner-baseline.json ]; then
          echo "Scanning with baseline..."
          ./secretscanner scan . --baseline .secretscanner-baseline.json --format sarif --fail-on-findings --output secretscanner-results.sarif || true
        else
          echo "Scanning without baseline (first run)..."
          ./secretscanner scan . --format sarif --output secretscanner-results.sarif || true
          # Generate baseline from this scan
          ./secretscanner scan . --format json --output secretscanner-baseline-new.json
        fi
        
        # Count findings
        if [ -f secretscanner-results.sarif ]; then
          COUNT=$(jq '.runs[0].results | length' secretscanner-results.sarif)
          echo "findings=$COUNT" >> $GITHUB_OUTPUT
        else
          echo "findings=0" >> $GITHUB_OUTPUT
        fi
    
    - name: Upload SARIF to GitHub Security
      if: always() && steps.scan.outputs.findings > 0
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: secretscanner-results.sarif
        category: secretscanner
    
    - name: Upload artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: secretscanner-results
        path: |
          secretscanner-results.sarif
          *.json
        retention-days: 30
    
    - name: Update baseline
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        # Generate new baseline from current scan
        ./secretscanner scan . --format json --output .secretscanner-baseline.json
        echo "Baseline updated for future scans"
    
    - name: Check for secrets
      run: |
        # Fail if new secrets were found (exit code check)
        ./secretscanner scan . --fail-on-findings --severity high,critical || EXIT_CODE=$?
        if [ "${EXIT_CODE:-0}" -eq 1 ]; then
          echo "::error::New secrets found! Review the Security tab for details."
          exit 1
        fi
      continue-on-error: false

  # Optional: Build and release
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    needs: scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    strategy:
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
        exclude:
          - os: windows
            arch: arm64
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
    
    - name: Build
      env:
        GOOS: ${{ matrix.os }}
        GOARCH: ${{ matrix.arch }}
      run: |
        OUTPUT="secretscanner-${{ matrix.os }}-${{ matrix.arch }}"
        if [ "${{ matrix.os }}" = "windows" ]; then
          OUTPUT="${OUTPUT}.exe"
        fi
        go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" -o "dist/${OUTPUT}" ./cmd/secretscanner
    
    - name: Upload binaries
      uses: actions/upload-artifact@v4
      with:
        name: binaries
        path: dist/
